    <div class="gold-rule"></div>

  <!-- Contact links — update phone numbers and address -->
  <div class="contact-card">
    <a class="contact-link" href="https://wa.me/2348000000000" target="_blank">
      <div class="cl-icon">💬</div>
      <div class="cl-info">
        <div class="cl-label">WHATSAPP</div>
        <div class="cl-value">Chat with us</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(201,164,58,0.4)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </a>
    <a class="contact-link" href="tel:+2348000000000">
      <div class="cl-icon">📞</div>
      <div class="cl-info">
        <div class="cl-label">PHONE</div>
        <!-- Replace with real IVOTEL number -->
        <div class="cl-value">+234 800 000 0000</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(201,164,58,0.4)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </a>
    <a class="contact-link" href="mailto:info@ivotel.com">
      <div class="cl-icon">✉️</div>
      <div class="cl-info">
        <div class="cl-label">EMAIL</div>
        <!-- Replace with real email -->
        <div class="cl-value">info@ivotel.com</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(201,164,58,0.4)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </a>
    <a class="contact-link" href="https://maps.google.com" target="_blank">
      <div class="cl-icon">📍</div>
      <div class="cl-info">
        <div class="cl-label">ADDRESS</div>
        <!-- Replace with real address -->
        <div class="cl-value">IVOTEL Luxury Hotel, Nigeria</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(201,164,58,0.4)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </a>
  </div>
