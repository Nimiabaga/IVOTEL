<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="theme-color" content="#06111e"/>
  <title>Food — IVOTEL Luxury Hotel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- Cart FAB -->
  <button class="cart-fab" id="cartFab" onclick="openCart()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    Order
    <span class="cart-fab-count" id="cartCount">0</span>
  </button>

  <!-- Header -->
  <div class="inner-header">
    <div class="deco-row">
      <div class="deco-line"></div>
      <span class="deco-label">Culinary</span>
      <div class="deco-line"></div>
    </div>
    <h1 class="gold-text">Food Menu</h1>
    <div class="gold-rule"></div>
    <p class="inner-sub">Served with elegance</p>
  </div>

  <!-- Category chips -->
  <div class="cat-scroller-wrap">
    <div class="cat-scroller">
      <button class="cat-chip active" data-cat="all">All</button>
      <button class="cat-chip" data-cat="starters">Starters</button>
      <button class="cat-chip" data-cat="breakfast">Breakfast</button>
      <button class="cat-chip" data-cat="fingerfood">Finger Foods</button>
      <button class="cat-chip" data-cat="mains">Mains</button>
      <button class="cat-chip" data-cat="seafood">Seafood</button>
      <button class="cat-chip" data-cat="pasta">Pasta &amp; Salads</button>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <div class="search-bar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search dishes…"/>
      <button class="s-clear" id="sClear" style="display:none">✕</button>
    </div>
  </div>

  <!-- Card grid -->
  <div class="card-grid" id="cardGrid"></div>
  <div class="no-results" id="noResults" style="display:none">
    <span>🍽️</span><p>No dishes found</p>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a class="nav-link" href="index.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a class="nav-link active" href="food.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8zM6 1v3M10 1v3M14 1v3"/></svg>
      Food
    </a>
    <a class="nav-link" href="drinks.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 22h8M12 11v11M3 3l4 8h10l4-8H3z"/></svg>
      Drinks
    </a>
    <a class="nav-link" href="rooms.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 22V8l9-5 9 5v14"/><path d="M9 22V12h6v10"/></svg>
      Rooms
    </a>
    <a class="nav-link" href="contact.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8 19.79 19.79 0 01.07 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      Contact
    </a>
  </nav>

  <!-- Cart Drawer -->
  <div class="overlay" id="cartOverlay" onclick="closeCart()"></div>
  <div class="drawer" id="cartDrawer">
    <div class="drawer-handle"></div>
    <div class="drawer-head">
      <h3 class="gold-static">Your Order</h3>
      <button class="drawer-x" onclick="closeCart()">✕</button>
    </div>
    <div class="drawer-body" id="drawerBody">
      <div class="cart-empty-state" id="cartEmpty">
        <div class="ei">🛒</div>
        <p>Your order is empty</p>
        <small>Tap + on any item to add it</small>
      </div>
      <ul class="cart-items" id="cartItems"></ul>
    </div>
    <div class="drawer-foot" id="drawerFoot" style="display:none">
      <div class="sum-row"><span>Subtotal</span><span id="sumSub"></span></div>
      <div class="sum-row"><span>Service (10%)</span><span id="sumSvc"></span></div>
      <div class="sum-row sum-total"><span>Total</span><span id="sumTotal"></span></div>
      <div class="room-wrap">
        <label>ROOM / TABLE NUMBER</label>
        <input type="text" id="roomNo" placeholder="e.g. 204 or Table 7"/>
      </div>
      <button class="btn-gold" onclick="placeOrder()">Place Order</button>
    </div>
  </div>
  <div class="overlay" id="confirmOverlay"></div>
  <div class="modal" id="confirmModal">
    <div class="confirm-icon">✓</div>
    <h3 class="gold-static">Order Placed!</h3>
    <p id="confirmMsg">Your order has been received.</p>
    <button class="btn-gold" onclick="closeConfirm()">Done</button>
  </div>

  <script src="js/cart.js"></script>
  <script>

       once you have the actual food photos.
    ─────────────────────────────────────────────────── */

      // Starters
      { name:'Peppersoup',        cat:'starters',  emoji:'🍲', grad:'g6', price:3500  },
      { name:'Suya Platter',      cat:'starters',  emoji:'🍢', grad:'g2', price:5500  },
      { name:'Asun',              cat:'starters',  emoji:'🥩', grad:'g6', price:5000  },
      { name:'Peppered Gizzard',  cat:'starters',  emoji:'🍖', grad:'g6', price:4000  },
      // Breakfast
      { name:'English Breakfast', cat:'breakfast', emoji:'🍳', grad:'g2', price:8000  },
      { name:'Pancakes & Syrup',  cat:'breakfast', emoji:'🥞', grad:'g2', price:5000  },
      { name:'Omelette & Toast',  cat:'breakfast', emoji:'🍞', grad:'g1', price:4500  },
      { name:'Avocado Toast',     cat:'breakfast', emoji:'🥑', grad:'g5', price:5500  },
      // Finger Foods
      { name:'Spring Rolls (6)',  cat:'fingerfood',emoji:'🥟', grad:'g5', price:3000  },
      { name:'Chicken Wings',     cat:'fingerfood',emoji:'🍗', grad:'g6', price:4500  },
      { name:'Samosa Platter',    cat:'fingerfood',emoji:'🥟', grad:'g5', price:2500  },
      { name:'BBQ Chicken Wings', cat:'fingerfood',emoji:'🍗', grad:'g2', price:4000  },
      // Mains
      { name:'Jollof Rice & Chicken',    cat:'mains', emoji:'🍛', grad:'g5', price:8500  },
      { name:'Fried Rice & Beef',        cat:'mains', emoji:'🍚', grad:'g5', price:7500  },
      { name:'Pepper Steak',             cat:'mains', emoji:'🥩', grad:'g6', price:15000 },
      { name:'Pasta Carbonara',          cat:'mains', emoji:'🍝', grad:'g1', price:9000  },
      { name:'Jamaican Beef Stir Fry',   cat:'mains', emoji:'🥘', grad:'g6', price:6000  },
      { name:'China Pot with Rice',      cat:'mains', emoji:'🫕', grad:'g3', price:15000 },
      // Seafood
      { name:'Grilled Jumbo Prawn',      cat:'seafood',emoji:'🦐',grad:'g3', price:11000 },
      { name:'Seafood in Cream Sauce',   cat:'seafood',emoji:'🦞',grad:'g3', price:13000 },
      { name:'Grilled Tilapia',          cat:'seafood',emoji:'🐟',grad:'g3', price:9500  },
      // Pasta & Salads
      { name:'Chicken Salad',            cat:'pasta', emoji:'🥗', grad:'g5', price:9000  },
      { name:'Caesar Salad',             cat:'pasta', emoji:'🥬', grad:'g5', price:7000  },
      { name:'Club Sandwich',            cat:'pasta', emoji:'🥪', grad:'g1', price:5500  },
    ];

    renderPageItems(FOOD);
    setupSearch(FOOD, items => renderPageItems(items));
    setupCatChips(FOOD,  items => renderPageItems(items));
  </script>
</body>
</html>
